name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate vault (links + frontmatter)
        run: python3 templates/vault/_meta/validate.py

      - name: Unit tests (validate, dedup, skill, retriever)
        run: |
          for t in tests/test_*.py; do
            echo "== $t =="
            python3 "$t"
          done

      - name: Retrieval benchmark smoke (fixtures, offline)
        run: |
          python3 benchmarks/longmemeval/run_longmemeval.py --data benchmarks/longmemeval/fixture.json
          python3 benchmarks/locomo/run_locomo.py --data benchmarks/locomo/fixture.json

      - name: Answer-track smoke (offline echo/exact, no API)
        run: |
          python3 benchmarks/longmemeval/run_longmemeval.py --data benchmarks/longmemeval/fixture.json \
            --track answer --answerer echo --judge exact
          python3 benchmarks/distillation_eval.py --data benchmarks/longmemeval/fixture.json \
            --distiller echo --answerer echo --judge exact

      - name: ShellCheck shell scripts
        run: shellcheck install.sh uninstall.sh scripts/*.sh bin/synapse templates/vault/_meta/hooks/*.sh

      - name: Demo script smoke (throwaway vault, learn -> index -> recall)
        run: bash scripts/demo.sh

      - name: Hook smoke (UserPromptSubmit / Stop never crash or block wrongly)
        run: |
          H=templates/vault/_meta/hooks
          printf '{"prompt":"how do I distill knowledge after work"}' | bash "$H/prompt-retrieve.sh" \
            | python3 -c 'import json,sys; assert "synapse-memory" in json.load(sys.stdin)["hookSpecificOutput"]["additionalContext"]'
          printf '{"prompt":"x"}' | bash "$H/prompt-retrieve.sh"        # too short -> no output, exit 0
          printf 'not json'       | bash "$H/prompt-retrieve.sh"        # garbage -> no crash, exit 0
          printf '{"stop_hook_active":true}' | bash "$H/stop-check.sh"  # loop guard -> exit 0

      - name: Smoke test install + doctor
        run: |
          tmp="$(mktemp -d)"
          env HOME="$tmp" PREFIX="$tmp/.local/bin" SYNAPSE_HOME="$tmp/Synapse" \
              SHELL_RC="$tmp/.bashrc" bash ./install.sh
          env HOME="$tmp" "$tmp/.local/bin/synapse" doctor
          test -x "$tmp/.local/bin/brain"
